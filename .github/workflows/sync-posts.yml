name: Sync WordPress Posts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 1 * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r automation/requirements.txt
      - run: python -m pipeline sync-posts
        working-directory: automation
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync published posts from WordPress'
          file_pattern: automation/data/published.json
