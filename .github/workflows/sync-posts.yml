name: Sync WordPress Posts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 1 * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r automation/requirements.txt
      - name: Diagnose REST API from GitHub (海外IP)
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          echo "=== wp-json (no auth) ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --connect-timeout 30 "${WP_URL%/}/wp-json/"
          echo "=== posts (no auth) ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --connect-timeout 30 \
            "${WP_URL%/}/wp-json/wp/v2/posts?per_page=1"
          echo "=== posts (with auth) ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --connect-timeout 30 -u "${WP_USER}:${WP_APP_PASSWORD// /}" \
            "${WP_URL%/}/wp-json/wp/v2/posts?status=publish&per_page=1&_embed=1"
      - run: python -m pipeline sync-posts
        working-directory: automation
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync published posts from WordPress'
          file_pattern: automation/data/published.json
