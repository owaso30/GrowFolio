# LLM / 画像生成プロバイダ（環境変数で上書き可）

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  max_tokens: 8192
  temperature: 0.65

images:
  provider: fal
  featured_model: fal-ai/flux-2-pro
  body_model: fal-ai/flux-2-pro
  prompt_suffix: ". Near-futuristic clean digital illustration, polished vector aesthetic with soft depth, elegant gradients, crisp composition. Topic must be visually obvious. No photorealism, no readable text, no watermarks, no official logos, no oversaturated colors, no chaotic AI slop, no generic abstract blobs unrelated to the topic."
