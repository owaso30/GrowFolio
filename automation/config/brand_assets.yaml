# 記事画像用ブランドアセット（公式ロゴ URL / ローカルファイル）
# logo_url が取得できない場合は assets/logos/{brand_key}.png を配置

# ハイブリッドアイキャッチ（左ロゴ＋右イラスト）のレイアウト
# ITキャリア記事（vscode / github_copilot / cursor）で確定した表示サイズを全記事で統一
hybrid_featured:
  panel_width_ratio: 0.36
  logo_max_width_ratio_of_panel: 0.78
  logo_max_height_ratio_of_canvas: 0.34

brands:
  bitradex:
    name: BitradeX
    logo_url: "https://bitradex.com/favicon.ico"
    bg_color: "#f0f7ff"
    accent_color: "#1d4ed8"

  github_copilot:
    name: GitHub Copilot
    logo_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
    bg_color: "#f6f8fa"
    accent_color: "#24292f"

  cursor:
    name: Cursor
    logo_url: ""
    bg_color: "#f8fafc"
    accent_color: "#0f172a"

  vscode:
    name: Visual Studio Code
    logo_url: ""
    bg_color: "#f0f4f8"
    accent_color: "#007acc"

  chatgpt:
    name: ChatGPT
    # ローカル assets/logos/chatgpt.png を優先。URLはフォールバック
    logo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/ChatGPT_logo.svg/500px-ChatGPT_logo.svg.png"
    bg_color: "#f7f7f8"
    accent_color: "#10a37f"

  claude:
    name: Claude
    logo_url: "https://www.anthropic.com/images/icons/apple-touch-icon.png"
    bg_color: "#faf5f0"
    accent_color: "#c96442"

  microsoft_365:
    name: Microsoft 365
    logo_url: "https://www.microsoft.com/favicon.ico"
    bg_color: "#f5f5f5"
    accent_color: "#0078d4"

  nisa:
    name: 新NISA
    logo_url: ""
    bg_color: "#f0fdf4"
    accent_color: "#059669"
