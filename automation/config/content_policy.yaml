# 自動投稿の編集方針（クラスター穴埋め＋重複防止）
# 方針: ブルーオーシャンのロングテール × IT/投資トレンドTOP。エディタ単発は出さない。
auto_publish:
  description: "新規はクラスター穴埋めのみ。同意図はリライト候補へ。IT・投資トレンドで勝負。"
  allowed_categories:
    - 始め方
    - 運用・実績
    - 出金・トラブル
    - リスク・評判
    - 紹介報酬
    - 税金
