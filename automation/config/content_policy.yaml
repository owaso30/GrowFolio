    - 投資入門
    - ITキャリア
    - 相場・市況
    - テック動向
  # 火金の週2本枠（スコア上位のうち、枠の空いているクラスターを選ぶ）
  weekly_quota:
    bitradex: 1
    tax: 1
    it: 1
    invest: 1
    other: 0
  # 月次の上限（週枠と併用。過剰な同クラスター連投を抑える）
  monthly_quota:
    it: 4
    invest: 4
  # キューに載せるKWのトピックフィルタ（いずれかを含むもの）
