# 自動投稿の編集方針（Money × Technology コンセプト全般）
auto_publish:
  description: "トレンド・ニュース起点で、ブログコンセプトに沿った記事を自動生成・公開"
  allowed_categories:
    - 始め方
    - 運用・実績
    - 出金・トラブル
    - リスク・評判
    - 紹介報酬
    - 税金
    - AI副業
    - 投資入門
    - ITキャリア
  # キューに載せるKWのトピックフィルタ（いずれかを含むもの）
  topic_keywords:
    - AI
    - 生成AI
    - ChatGPT
    - 副業
    - 投資
    - NISA
    - 資産
    - 仮想通貨
    - 暗号資産
    - BitradeX
    - 自動売買
    - 税金
    - 確定申告
    - 金融
    - キャリア
    - 転職
    - エンジニア
    - プログラミング
    - 開発
    - ITスキル
    - スキルアップ
    - Python
    - JavaScript
    - TypeScript
    - GitHub
    - VSCode
    - Cursor
    - 資格
    - ポートフォリオ
    - リモートワーク
    - ITツール

