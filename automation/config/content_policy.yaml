# 自動投稿の編集方針（クラスター穴埋め＋重複防止）
auto_publish:
  description: "新規はクラスターの穴埋めのみ。同意図はリライト候補へ。"
  allowed_categories:
    - 始め方
    - 運用・実績
    - 出金・トラブル
    - リスク・評判
    - 紹介報酬
    - 税金
    - AI副業
    - 投資入門
    - ITキャリア
  # 火金の週2本枠（クラスター別）。枠が埋まったクラスターはスキップ。
  weekly_quota:
    bitradex: 1
    tax: 1
    other: 0
  # IT系は自動枠から原則外し、月次上限のみ（緊急時の逃し弁）
  monthly_quota:
    it: 2
  # キューに載せるKWのトピックフィルタ（いずれかを含むもの）
  # IT単発ニュースは意図的に薄くし、BitradeX・税金・制度を優先
  topic_keywords:
    - BitradeX
    - 仮想通貨
    - 暗号資産
    - 税金
    - 確定申告
    - クリプタクト
    - NISA
    - 投資
    - 資産
    - 金融
    - 規制
    - 制度
    - 副業
    - AI
    - 生成AI
    - ChatGPT
  # クラスター判定（KW・タイトル・slug に対して match_any）
  clusters:
    bitradex:
      match_any:
        - bitradex
        - ビットレード
    tax:
      match_any:
        - 税金
        - 確定申告
        - 雑所得
        - 申告分離
        - クリプタクト
        - 課税
    it:
      match_any:
        - vscode
        - vs code
        - github
        - copilot
        - cursor
        - プログラミング
        - エンジニア
        - typescript
        - javascript
        - python
        - 開発ツール
  # 意図指紋用エンティティ正規化（同バケット判定）
  entity_aliases:
    bitradex:
      - bitradex
      - ビットレード
    vscode:
      - vscode
      - vs code
      - visual studio code
    copilot:
      - github copilot
      - copilot chat
      - copilot
    cursor:
      - cursor
    chatgpt:
      - chatgpt
      - chat gpt
      - openai
    claude:
      - claude
      - anthropic
    nisa:
      - nisa
      - 新nisa
      - つみたてnisa
    tax:
      - 税金
      - 確定申告
      - 雑所得
      - 申告分離
      - クリプタクト
    crypto:
      - 仮想通貨
      - 暗号資産
      - crypto
  fingerprint:
    # 共通エンティティがこの数以上なら同意図扱い
    min_shared_entities: 2
    # エンティティ1つでも fuzzy がこの値以上なら重複
    fuzzy_threshold: 72
    # エンティティ一致時の追加 fuzzy 閾値（低め）
    fuzzy_with_entity_threshold: 55
    jaccard_threshold: 0.45

# 自動投稿から除外するKW（個人名×評判・口コミ系）
