    - ChatGPT
    - Claude
    - Cursor
    - Copilot
    - GitHub
    - OpenAI
    - NISA
    - SBI
    - Coincheck
    - bitFlyer
    - GMO
    - DeFi
    - DEX
    - ETF
    - クリプタクト
    - 金融庁
    - 国税庁
    - TypeScript
    - Python
    - AWS
    - Docker
  trend_focus_modifiers:
    - 最新
    - ニュース
    - 制度
    - 規制
    - 改正
    - 発表
    - 動向
    - 影響
    - 見通し
    - 将来
    - トレンド
    - 展望
    - 税金
    - 確定申告
    - 対処
  # 後方互換（参照のみ・手順語は含めない）
  news_focus_modifiers:
    - 最新
    - ニュース
    - 制度
    - 規制
    - 改正
    - 発表
    - 動向
    - 影響
    - 見通し
    - 税金
    - 確定申告
    - 対処

# トレンド収集・KW調査（BitradeX・税金・制度を優先）
trend_research:
  news_queries:
    - BitradeX 仮想通貨
    - 暗号資産 規制 2026
    - 仮想通貨 税金 改正
    - 仮想通貨 確定申告
    - NISA 制度 改正
    - DeFi 規制 動向
    - 仮想通貨 取引所 規制
    - クリプタクト 税金
    - 暗号資産 申告分離課税
  suggest_seeds:
    - BitradeX 出金 できない
    - BitradeX 最新 動向
    - 暗号資産 規制 2026
    - NISA 制度 改正 2026
    - 仮想通貨 税金 改正
    - 仮想通貨 税金 クリプタクト
    - 仮想通貨 確定申告 やり方
    - DeFi 規制 影響

# ブルーオーシャンKW戦略（ロングテール × 競合回避）
blue_ocean:
  min_chars: 12
  min_words: 3
  max_words: 10
  prefer_words_min: 3
  reject_raw_news_headlines: true
  reject_high_competition: true
  use_serp_related: true
  max_expansion_per_seed: 8
  trend_bonus: 10
  trend_focus_bonus: 12
  news_focus_bonus: 8
  specificity_bonus: 25
  long_tail_bonus: 10
  intent_modifier_bonus: 6
  high_intent_bonus: 8
  head_term_penalty: 30
  procedure_penalty: 45
  generic_penalty: 35
  reputation_penalty: 35
  preferred_intents: [A, B]
  head_terms:
    - 投資
    - 仮想通貨
    - 暗号資産
    - ChatGPT
    - 生成AI
    - NISA
    - 副業
    - AI
  intent_modifiers:
    - 制度
    - 規制
    - 改正
    - 税金
    - 確定申告
    - 比較
    - できない
    - 対処
    - 反映されない
    - ログイン
  expansion_modifiers:
    - 規制 影響
    - 制度 改正
    - 税金 改正
    - 確定申告 やり方
    - 2026 最新
    - できない 対処
    - 反映されない 時間
    - 比較 特徴
  news_headline_markers:
    - 速報
    - 発表
    - 推移
    - 株価
    - 決算
    - が発表
    - へ
  reject_patterns:
    - "^[ぁ-んァ-ンa-zA-Z0-9]{1,6}$"
  serp:
    min_opportunity_ratio: 0.25
    blue_ocean_serp_bonus: 15
    red_ocean_serp_penalty: 20
    red_ocean_authority_threshold: 6
    opportunity_domain_bonus: 4
    authority_domain_penalty: 3
    authority_domains:
      - wikipedia.org
      - yahoo.co.jp
      - google.com
      - go.jp
      - mufg.jp
      - sbi.co.jp
      - rakuten.co.jp
      - nikkei.com
      - bloomberg.co.jp
      - reuters.com
    opportunity_domains:
      - note.com
      - hatena
      - ameblo
      - wordpress
      - blogspot
      - livedoor
      - fc2.com
      - personal

intent_categories:
  A: {name: トラブル解決, intent_depth: 5, conversion: 5}
  B: {name: 税金, intent_depth: 4, conversion: 4}
  C: {name: 手順×組合せ, intent_depth: 4, conversion: 5}
  D: {name: 懐疑・比較, intent_depth: 5, conversion: 5}
  E: {name: 運用報告, intent_depth: 3, conversion: 4}
  F: {name: 指名・基本, intent_depth: 2, conversion: 3}

editorial:
  trend_research: true
  max_trend_headlines: 8
  require_fact_opinion_split: true
  require_multi_source: true
  min_reference_sources: 3
  fact_section_heading: "いま起きていること（事実）"
  opinion_section_heading: "筆者の考察・見解"
  fact_label: "【事実】"
  fact_badge_text: "事実"
  opinion_label: "【考察】"
  opinion_badge_text: "考察"
  source_section_heading: "参考・関連情報"
  images:
    prefer_brand_logo: true
    avoid_ai_aesthetic: true
    flux_style: "editorial minimal photo or clean flat design, no neon, no 3D, no fake UI"
  emphasis:
    min_cap_boxes: 2
    min_mark_highlights: 3
