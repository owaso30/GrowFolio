    - nisa
    - chatgpt
    - sbi
    - coincheck
    - bitflyer
    - bitbank
    - gmo
    - okj
    - btcc
    - nexo
    - 確定申告
    - 金融庁
    - 国税庁
    - 取引所
    - python
    - javascript
    - typescript
    - github
    - vscode
    - cursor
    - aws
    - azure
    - docker
    - claude
    - openai
    - copilot
    - defi
    - dex
    - etf
    - クリプタクト
    - bitradex
  # 手順・やり方系（画像依存が高い → キューから除外）
  procedure_modifiers:
