  fingerprint:
    # 共通エンティティがこの数以上なら同意図扱い
    min_shared_entities: 2
    # エンティティ1つでも fuzzy がこの値以上なら重複
    fuzzy_threshold: 72
    # エンティティ一致時の追加 fuzzy 閾値（低め）
    fuzzy_with_entity_threshold: 55
    jaccard_threshold: 0.45

